services:
  oauth-mock:
    image: node:22-alpine
    container_name: oauth-mock
    restart: always
    working_dir: /app
    command: sh -c "npm ci && npm run dev"
    volumes:
      - ./:/app
      - oauth-mock-node-modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "8787:8787"
    networks:
      - oauth-mock-shared

networks:
  oauth-mock-shared:
    name: oauth-mock-shared

volumes:
  oauth-mock-node-modules:
